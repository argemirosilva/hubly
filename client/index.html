<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Hubly - Gestão de Agendamentos e Clientes</title>

    <!-- Favicon -->
    <link rel="icon" href="/manus-storage/favicon_393a6928.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/manus-storage/favicon-16x16_8542ece4.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/manus-storage/favicon-32x32_9f1eb2fb.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/manus-storage/apple-touch-icon-180x180_cf0568b2.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#b8860b" />
    <!-- Capacitor: safe area para notch e barra de status -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hubly" />
    <!-- Notificações nativas do SO -->
    <meta name="notification-permission" content="default" />
    <meta name="notification-badge" content="/manus-storage/favicon-32x32_9f1eb2fb.png" />

    <!-- SEO -->
    <meta name="description" content="Hubly - Hub de Serviços Inteligentes. Gerencie agendamentos, clientes, financeiro e automações em um único lugar." />
    <meta name="keywords" content="agendamento, salão de beleza, clínica, barbearia, gestão, automação, WhatsApp, financeiro" />
    <meta name="author" content="Hubly" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hubly" />
    <meta property="og:title" content="Hubly - Gestão de Agendamentos e Clientes" />
    <meta property="og:description" content="Gerencie agendamentos, clientes, financeiro e automações de WhatsApp em um único lugar. Ideal para salões, clínicas e barbearias." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/hubly-og-image_d2db62e7.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="Hubly - Gestão de Agendamentos e Clientes" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hubly - Gestão de Agendamentos e Clientes" />
    <meta name="twitter:description" content="Gerencie agendamentos, clientes, financeiro e automações de WhatsApp em um único lugar." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/hubly-og-image_d2db62e7.jpg" />
    <meta name="twitter:image:alt" content="Hubly - Gestão de Agendamentos e Clientes" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root">
      <!-- Splash inline: exibido até o React montar -->
      <div id="app-splash" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:#1a1208;gap:16px;">
        <img src="/manus-storage/icon-192x192_752519b8.png" alt="Hubly" style="width:80px;height:80px;border-radius:20px;animation:pulse-splash 1.5s ease-in-out infinite;" />
        <p style="color:#45291a;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;">Carregando...</p>
      </div>
      <style>
        @keyframes pulse-splash { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(0.95)} }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Bloquear zoom (pinch-to-zoom e double-tap) em todos os navegadores incluindo iOS Safari -->
    <script>
      // Bloqueia pinch-to-zoom
      document.addEventListener('touchmove', function(e) {
        if (e.touches && e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });
      // Bloqueia double-tap zoom no iOS
      var lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
    </script>

    <!-- Trocar manifest dinamicamente para /atendimento -->
    <script>
      (function() {
        var path = window.location.pathname;
        if (path === '/atendimento' || path.startsWith('/atendimento/')) {
          var link = document.querySelector('link[rel="manifest"]');
          if (link) {
            link.href = '/manifest-atendimento.json';
          }
          // Ajustar theme-color para o dark da central
          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) themeMeta.content = '#09090b';
          // Ajustar apple-mobile-web-app-title
          var titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (titleMeta) titleMeta.content = 'Atendimento';
        }
      })();
    </script>

    <!-- Registrar Service Worker (necessário para push notifications) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) { console.log('[PWA] Service Worker registrado:', reg.scope); })
            .catch(function(err) { console.log('[PWA] Falha ao registrar SW:', err); });
        });
      }
    </script>

    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
