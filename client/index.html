<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Agendei - Sistema de Agendamento Inteligente</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Agendei" />
    <link rel="apple-touch-icon" href="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/icon-192_3a756090.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/icon-192_3a756090.png" />

    <!-- SEO -->
    <meta name="description" content="Sistema inteligente de agendamento para salões de beleza" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Registrar Service Worker apenas em produção -->
    <script>
      if ('serviceWorker' in navigator) {
        // Em desenvolvimento, desregistrar qualquer SW existente para evitar cache de assets antigos
        if (location.hostname === 'localhost' || location.hostname.includes('.manus.computer') || location.hostname.includes('.manuspre.computer')) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) { reg.unregister(); });
          });
        } else {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js')
              .then(function(reg) { console.log('[PWA] Service Worker registrado:', reg.scope); })
              .catch(function(err) { console.log('[PWA] Falha ao registrar SW:', err); });
          });
        }
      }
    </script>

    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
