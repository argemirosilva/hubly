<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Hubly - Hub de Serviços Inteligentes</title>

    <!-- Favicon -->
    <link rel="icon" href="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/favicon_d7127699.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/favicon-16x16_70953d42.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/favicon-32x32_d0d29808.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/hubly-icon-192_c46a0588.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a3a6b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hubly" />

    <!-- SEO -->
    <meta name="description" content="Hubly - Hub de Serviços Inteligentes. Gerencie agendamentos, clientes, financeiro e automações em um único lugar." />
    <meta name="keywords" content="agendamento, salão de beleza, clínica, barbearia, gestão, automação, WhatsApp, financeiro" />
    <meta name="author" content="Hubly" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hubly" />
    <meta property="og:title" content="Hubly - Hub de Serviços Inteligentes" />
    <meta property="og:description" content="Gerencie agendamentos, clientes, financeiro e automações de WhatsApp em um único lugar. Ideal para salões, clínicas e barbearias." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/hubly-og-image_d2db62e7.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="Hubly - Hub de Serviços Inteligentes" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hubly - Hub de Serviços Inteligentes" />
    <meta name="twitter:description" content="Gerencie agendamentos, clientes, financeiro e automações de WhatsApp em um único lugar." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310419663029250418/BkCt9rpSQdtCMrvdCmsRG4/hubly-og-image_d2db62e7.jpg" />
    <meta name="twitter:image:alt" content="Hubly - Hub de Serviços Inteligentes" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Registrar Service Worker (necessário para push notifications) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) { console.log('[PWA] Service Worker registrado:', reg.scope); })
            .catch(function(err) { console.log('[PWA] Falha ao registrar SW:', err); });
        });
      }
    </script>

    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
